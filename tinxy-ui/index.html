<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tinxy Light Control</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Token Setup Screen -->
  <div id="token-screen" class="screen">
    <div class="token-card">
      <div class="brand">
        <span class="brand-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2a7 7 0 0 1 7 7c0 2.65-1.48 4.96-3.67 6.17L15 17H9l-.33-1.83C6.48 13.96 5 11.65 5 9a7 7 0 0 1 7-7z" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
            <path d="M9 17h6v1.5a.5.5 0 0 1-.5.5h-5a.5.5 0 0 1-.5-.5V17z" fill="#d97706"/>
            <path d="M10.5 19.5h3" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <h1>Tinxy <span>Control</span></h1>
        <p>Enter your Tinxy API token to get started</p>
      </div>
      <div class="form-group">
        <label for="token-input">API Token</label>
        <input
          id="token-input"
          type="password"
          placeholder="Paste your Bearer token here..."
          autocomplete="off"
          spellcheck="false"
        />
        <small>
          Get your token from the Tinxy mobile app:
          Settings &rarr; API Token &rarr; Get
        </small>
      </div>
      <button id="connect-btn" class="btn btn-primary">
        Connect
      </button>
      <div id="token-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-screen" class="screen hidden">
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand-dot"></span>
        <span class="topbar-title">Tinxy Control</span>
        <span id="live-badge" class="live-badge hidden">
          <span class="live-pulse"></span>LIVE
        </span>
      </div>
      <div class="topbar-right">
        <button id="refresh-btn" class="btn btn-icon" title="Refresh devices">
          &#8635;
        </button>
        <button id="logout-btn" class="btn btn-outline-sm">
          Logout
        </button>
      </div>
    </header>

    <main class="dashboard">
      <!-- Status Bar -->
      <div id="status-bar" class="status-bar hidden">
        <span id="status-msg"></span>
      </div>

      <!-- Loading State -->
      <div id="loading-state" class="loading-state hidden">
        <div class="spinner"></div>
        <p>Fetching devices...</p>
      </div>

      <!-- Error State -->
      <div id="error-state" class="error-state hidden">
        <div class="error-icon">⚠️</div>
        <p id="error-text"></p>
        <button id="retry-btn" class="btn btn-primary">Retry</button>
      </div>

      <!-- Devices Grid -->
      <div id="devices-grid" class="devices-grid hidden"></div>
    </main>
  </div>

  <!-- Device Card Template -->
  <template id="device-card-tpl">
    <div class="device-card">
      <div class="device-header">
        <div class="device-info">
          <div class="device-icon-wrap">
            <span class="device-icon">&#128161;</span>
          </div>
          <div>
            <h3 class="device-name"></h3>
            <span class="device-type"></span>
          </div>
        </div>
        <span class="device-badge"></span>
      </div>
      <div class="device-nodes"></div>
    </div>
  </template>

  <!-- Node Row Template -->
  <template id="node-row-tpl">
    <div class="node-row">
      <div class="node-info">
        <span class="node-label"></span>
        <span class="node-state-dot"></span>
      </div>
      <button class="toggle-btn" aria-label="Toggle device">
        <span class="toggle-knob"></span>
      </button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
